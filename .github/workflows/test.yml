name: test

# Integration tests perform real network downloads (Iris, Titanic, UCI, ...),
# so this workflow can fail intermittently when an upstream host is down or
# rate-limits GitHub runners. It is intentionally not meant to be a required
# status check for merging.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-features
